name: Deploy (obfuscated) to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Stage source
        run: rsync -a --exclude='.git' --exclude='.github' --exclude='Makefile' ./ stage/

      - name: Obfuscate CSS class names
        # Renames CSS classes to short hashes and rewrites them consistently
        # across CSS, HTML and JS. ids:false keeps #theme-toggle/#theme-color,
        # and the ignore list preserves the four classes site.js builds from
        # string literals (.ln, .drift, .term-body pre) or shares with an id
        # (theme-toggle); mangling those would break theme switching.
        run: |
          npm i -D postcss postcss-cli postcss-obfuscator
          cat > postcss.config.cjs <<'EOF'
          module.exports = {
            plugins: [
              require('postcss-obfuscator')({
                enable: true,
                length: 6,
                classMethod: 'random',
                ids: false,
                classIgnore: ['ln', 'drift', 'term-body', 'theme-toggle'],
                srcPath: 'stage',
                desPath: 'mangled',
                extensions: ['.html', '.js'],
                keepData: false,
              })
            ]
          }
          EOF
          npx postcss stage/a/site.css -o mangled/a/site.css --config postcss.config.cjs

      - name: Assemble dist/ (JS obfuscation + minify, from the class-mangled tree)
        run: |
          rsync -a mangled/ dist/
          touch dist/.nojekyll

          npx -y javascript-obfuscator mangled/a/site.js --output dist/a/site.js \
            --compact true \
            --control-flow-flattening true \
            --control-flow-flattening-threshold 0.75 \
            --dead-code-injection true \
            --dead-code-injection-threshold 0.3 \
            --string-array true \
            --string-array-encoding 'base64' \
            --string-array-threshold 0.8 \
            --identifier-names-generator hexadecimal \
            --self-defending true \
            --simplify true

          npx -y clean-css-cli -o dist/a/site.css mangled/a/site.css

          for f in index.html health.html; do
            npx -y html-minifier-terser \
              --collapse-whitespace \
              --remove-comments \
              --minify-css true \
              "mangled/$f" -o "dist/$f"
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
